server:
  port: 8084

spring:
  application:
    name: subscription-service
  config:
    import: optional:configserver:http://config-server:8888
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db-postgres:5432/mecano_billing_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:0116}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_REMsk_test_51Tdg7m2cEVttqlOkst5q4E9JVqAGnIt4PHaJU3833ZxWcE99KM9wif9NCAMpNijOVxKOKNGhLxA1DI1ecGCdnWxr00yaCzOeaO}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_80fbbe79c88d16fbac696979bf731d07691bd2b2c376ea4f5aef91c578bc9faa}
    success-url: http://localhost:3000/subscription/success
