server:
  port: 8089

spring:
  application:
    name: marketplace-service
  datasource:
    url: jdbc:postgresql://db-postgres:5432/mecano_marketplace_db
    username: postgres
    password: "0116"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true