server:
  port: 8084

spring:
  application:
    name: subscription-service
  datasource:
    url: jdbc:postgresql://db-postgres:5432/mecano_billing_db
    username: postgres
    password: "sage237@"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/subscription/success}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/subscription/cancel}

management:
  endpoints:
    web:
      exposure:
        include: "*"